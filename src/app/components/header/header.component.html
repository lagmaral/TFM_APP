<ng-container *ngIf="isLargeScreen; else normalHeader">

  <ion-header>
    <!-- Contenedor general del header -->
    <div class="header">
      <!-- Logo -->
      <div class="header__logo">
        <img src="../../../assets/icon/logo.png" alt="Icono oficial" class="header__logo--img" />
      </div>

      <!-- Parte superior: redes sociales e idioma -->
      <div class="header__top">
        <!-- Título alineado a la izquierda -->
        <div class="header__top__title">
          <h1>PAULDARRAK FKT</h1>
        </div>

        <!-- Idioma y redes sociales alineados a la derecha -->
        <div class="header__top__right">
          <div class="header__top__lang">
            <select class="header__top__lang__select">
              <option value="es">Español</option>
              <option value="eu">Euskera</option>
            </select>
          </div>
          <div class="header__top__social">
            <ul class="header__top__social__list">
              <li><a href="https://www.facebook.com/p/PAULDARRAK-FKT-100063516820389/?locale=es_ES" class="header__top__social__list__item" target="_blank"><i class="fab fa-facebook-f"></i></a></li>
              <li><a href="https://www.instagram.com/pauldarrakoficial/" class="header__top__social__list__item" target="_blank"><i class="fab fa-instagram"></i></a></li>
              <li><button class="header__top__social__list__item header__top__social__list__button"><i class="material-icons">account_circle</i></button></li>
            </ul>
          </div>
        </div>
      </div>

      <!-- Parte inferior: menú y búsqueda -->
      <div class="header__bottom">
        <!-- Contenedor del menú -->
        <div class="header__bottom__menus">
          <!-- Menú desplegable 1 -->
          <div class="header__bottom__menu">
            <button class="header__bottom__menu__btn">Lugares de interés&nbsp;<ion-icon name="chevron-down"></ion-icon></button>
            <div class="header__bottom__menu__dropdown">
              <a href="#" class="header__bottom__menu__dropdown__item">Museos</a>
              <a href="#" class="header__bottom__menu__dropdown__item">Instalaciones deportivas</a>
              <a href="#" class="header__bottom__menu__dropdown__item">Monumentos</a>
            </div>
          </div>

          <!-- Menú desplegable 2 -->
          <div class="header__bottom__menu">
            <button class="header__bottom__menu__btn">Servicios&nbsp;<ion-icon name="chevron-down"></ion-icon></button>
            <div class="header__bottom__menu__dropdown">
              <a href="#" class="header__bottom__menu__dropdown__item">Restaurantes</a>
              <a href="#" class="header__bottom__menu__dropdown__item">Hoteles</a>
              <a href="#" class="header__bottom__menu__dropdown__item">Eventos</a>
            </div>
          </div>

          <!-- Menú desplegable 3 -->
          <div class="header__bottom__menu">
            <button class="header__bottom__menu__btn">Contacto&nbsp;<ion-icon name="chevron-down"></ion-icon></button>
            <div class="header__bottom__menu__dropdown">
              <a href="#" class="header__bottom__menu__dropdown__item">Teléfonos</a>
              <a href="#" class="header__bottom__menu__dropdown__item">Email</a>
              <a href="#" class="header__bottom__menu__dropdown__item">Redes sociales</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </ion-header>


</ng-container>
<ng-template #normalHeader>
  <ion-header [translucent]="true">
    <ion-toolbar>
      <!-- Icono de escudo a la izquierda -->
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
        <img src="../../../assets/icon/logo.png" alt="Shield Icon" style="width: 30px; height: 30px;">
      </ion-buttons>
      <!-- Título en el centro -->
      <ion-title>PAULDARRAK FKT</ion-title>
      <!-- Botón con icono de login a la derecha -->
      <ion-buttons slot="end">
        <ion-button>
          <i class="material-icons">account_circle</i> <!-- Icono de cuenta -->
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>
</ng-template>
