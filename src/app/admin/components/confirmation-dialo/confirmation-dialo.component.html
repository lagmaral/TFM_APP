<h2 mat-dialog-title class="custom-dialog-title">Confirmación</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button class="custom-dialog-button" (click)="onYesClick()">Aceptar</button>
  <button mat-button class ="custom-dialog-button" (click)="onNoClick()">Cancelar</button>
</mat-dialog-actions>
